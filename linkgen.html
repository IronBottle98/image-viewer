<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Markdown 이미지 링크 생성기</title>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif; margin: 16px; }
    .row { display: grid; gap: 10px; margin-bottom: 12px; }
    label { font-size: 14px; font-weight: 600; }
    input, textarea, button { width: 100%; font-size: 16px; padding: 10px; box-sizing: border-box; }
    textarea { min-height: 200px; resize: vertical; }
    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hint { font-size: 12px; opacity: 0.75; line-height: 1.4; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .ok { color: #0a7; font-weight: 700; }
    .bad { color: #c33; font-weight: 700; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>Markdown 이미지 링크 생성기</h2>

  <div class="card">
    <div class="row">
      <label>기본 URL (끝에 /까지)</label>
      <input id="baseUrl" class="mono" value="https://cdn.5ppai.org/ntr8/" />
      <div class="hint mono">예) https://cdn.5ppai.org/ntr8/</div>
    </div>

    <div class="row">
      <label>의상 (예: a..g 또는 a,b,c)</label>
      <input id="outfits" class="mono" value="a..g" />
      <div class="hint">범위는 <span class="mono">a..g</span>, 목록은 <span class="mono">a,b,c</span> 형태</div>
    </div>

    <div class="row">
      <label>캐릭터 (예: DY,YJ)</label>
      <input id="chars" class="mono" value="DY,YJ" />
    </div>

    <div class="row">
      <label>상황 (예: 01..48,h01..h78 또는 01..05,h01..h03)</label>
      <input id="situations" class="mono" value="01..48,h01..h78" />
      <div class="hint">
        숫자 범위는 <span class="mono">01..48</span> 처럼, h 접두는 <span class="mono">h01..h78</span> 처럼.
      </div>
    </div>

    <div class="row">
      <label>URL 조합 형식</label>
      <input id="pattern" class="mono" value="{outfit}/{char}/{scene}.webp" />
      <div class="hint mono">
        사용 가능 토큰: {outfit}, {char}, {scene}<br>
        현재 예시 결과: https://cdn.5ppai.org/ntr8/a/DY/01.webp
      </div>
    </div>

    <div class="row">
      <label>출력 형식</label>
      <input id="lineFormat" class="mono" value="![]({url})" />
      <div class="hint mono">사용 가능 토큰: {url}</div>
    </div>

    <div class="btns">
      <button id="genBtn">생성하기</button>
      <button id="copyBtn">복사하기</button>
    </div>

    <div id="status" class="hint" style="margin-top:8px;"></div>
  </div>

  <div class="card">
    <div class="row">
      <label>결과 (전체 선택 후 복사도 가능)</label>
      <textarea id="output" class="mono" placeholder="생성하면 여기에 나옵니다."></textarea>
      <div class="hint">
        줄 수가 너무 많으면 모바일에서 느려질 수 있어요. 그럴 땐 범위를 조금씩 나눠 생성하세요.
      </div>
    </div>
  </div>

<script>
  function normalizeBaseUrl(url) {
    url = (url || "").trim();
    if (!url) return "";
    // ensure ends with /
    if (!url.endsWith("/")) url += "/";
    return url;
  }

  function splitCSV(s) {
    return (s || "")
      .split(",")
      .map(x => x.trim())
      .filter(Boolean);
  }

  function expandAlphaRange(expr) {
    // supports "a..g" (single letters), or csv list "a,b,c"
    expr = (expr || "").trim();
    if (!expr) return [];
    if (expr.includes("..")) {
      const [a, b] = expr.split("..").map(x => x.trim());
      if (!a || !b) return [];
      if (a.length !== 1 || b.length !== 1) return [];
      const start = a.charCodeAt(0);
      const end = b.charCodeAt(0);
      const step = start <= end ? 1 : -1;
      const out = [];
      for (let c = start; step > 0 ? c <= end : c >= end; c += step) out.push(String.fromCharCode(c));
      return out;
    }
    return splitCSV(expr);
  }

  function pad2(n) {
    return String(n).padStart(2, "0");
  }

  function expandSceneToken(token) {
    // token forms:
    //  - "01..48"
    //  - "h01..h78"
    //  - single like "07" or "h12" or "x99" (any prefix+digits)
    token = token.trim();
    if (!token) return [];

    if (!token.includes("..")) return [token];

    const [left, right] = token.split("..").map(x => x.trim());
    if (!left || !right) return [];

    // detect optional prefix (letters) + digits
    const mL = left.match(/^([a-zA-Z]*)(\d+)$/);
    const mR = right.match(/^([a-zA-Z]*)(\d+)$/);
    if (!mL || !mR) return [];

    const pL = mL[1] || "";
    const pR = mR[1] || "";
    if (pL !== pR) return []; // require same prefix
    const prefix = pL;

    const nL = parseInt(mL[2], 10);
    const nR = parseInt(mR[2], 10);
    if (!Number.isFinite(nL) || !Number.isFinite(nR)) return [];

    // keep width of the numeric part from left side
    const width = mL[2].length;

    const step = nL <= nR ? 1 : -1;
    const out = [];
    for (let n = nL; step > 0 ? n <= nR : n >= nR; n += step) {
      out.push(prefix + String(n).padStart(width, "0"));
    }
    return out;
  }

  function expandScenes(expr) {
    // comma-separated tokens, each token may be a range like 01..48 or h01..h78
    const tokens = splitCSV(expr);
    const out = [];
    for (const t of tokens) {
      const expanded = expandSceneToken(t);
      out.push(...expanded);
    }
    return out;
  }

  function buildUrl(baseUrl, pattern, outfit, ch, scene) {
    let path = pattern;
    path = path.replaceAll("{outfit}", outfit);
    path = path.replaceAll("{char}", ch);
    path = path.replaceAll("{scene}", scene);
    // avoid double slashes
    return baseUrl + path.replace(/^\/+/, "");
  }

  function formatLine(lineFormat, url) {
    return lineFormat.replaceAll("{url}", url);
  }

  function setStatus(msg, ok=true) {
    const el = document.getElementById("status");
    el.innerHTML = `<span class="${ok ? "ok" : "bad"}">${ok ? "OK" : "주의"}</span> ${msg}`;
  }

  function generate() {
    const baseUrl = normalizeBaseUrl(document.getElementById("baseUrl").value);
    const outfitsExpr = document.getElementById("outfits").value;
    const charsExpr = document.getElementById("chars").value;
    const scenesExpr = document.getElementById("situations").value;
    const pattern = document.getElementById("pattern").value.trim();
    const lineFormat = document.getElementById("lineFormat").value.trim();

    if (!baseUrl || !pattern || !lineFormat) {
      setStatus("기본 URL / 패턴 / 출력 형식은 비워둘 수 없습니다.", false);
      return;
    }

    const outfits = expandAlphaRange(outfitsExpr);
    const chars = splitCSV(charsExpr);
    const scenes = expandScenes(scenesExpr);

    if (!outfits.length) { setStatus("의상 범위를 해석하지 못했습니다. (예: a..g 또는 a,b,c)", false); return; }
    if (!chars.length)   { setStatus("캐릭터 목록이 비어있습니다. (예: DY,YJ)", false); return; }
    if (!scenes.length)  { setStatus("상황 범위를 해석하지 못했습니다. (예: 01..48,h01..h78)", false); return; }

    const lines = [];
    for (const o of outfits) {
      for (const c of chars) {
        for (const s of scenes) {
          const url = buildUrl(baseUrl, pattern, o, c, s);
          lines.push(formatLine(lineFormat, url));
        }
      }
    }

    const output = lines.join("\n");
    document.getElementById("output").value = output;

    setStatus(`생성 완료: ${lines.length.toLocaleString()}줄`);
  }

  async function copyOut() {
    const text = document.getElementById("output").value || "";
    if (!text) { setStatus("복사할 내용이 없습니다. 먼저 생성하세요.", false); return; }
    try {
      await navigator.clipboard.writeText(text);
      setStatus("클립보드에 복사했습니다.");
    } catch (e) {
      // fallback: select
      const ta = document.getElementById("output");
      ta.focus();
      ta.select();
      setStatus("자동 복사 권한이 없어서 전체 선택했습니다. 상단 메뉴에서 복사하세요.", false);
    }
  }

  document.getElementById("genBtn").addEventListener("click", generate);
  document.getElementById("copyBtn").addEventListener("click", copyOut);

  // auto-generate on load for convenience
  generate();
</script>
</body>
</html>
